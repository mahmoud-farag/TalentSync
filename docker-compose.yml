  postgres:
    image: postgres:15-alpine
    container_name: talentsync-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: talentsync
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

